<style>
  :root{
    --void:#060313;
    --indigo:#0d0826;
    --violet:#5b3a9e;
    --magenta:#d44cc4;
    --cyan:#46e0d8;
    --gold:#f5c66b;
    --cream:#efeaff;
    --dim:rgba(220,214,245,0.40);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    background:var(--void);
    overflow:hidden;
    color:var(--cream);
    font-family:'Cormorant Garamond','EB Garamond',Georgia,'Times New Roman',serif;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }

  /* ---------- canvases ---------- */
  #bg,#fx{
    position:fixed;inset:0;width:100%;height:100%;
    display:block;pointer-events:none;
  }
  #bg{z-index:0;}
  #fx{z-index:1;}

  /* subtle scrim so text stays readable over the flowing field */
  .scrim{
    position:fixed;inset:0;z-index:2;pointer-events:none;
    background:radial-gradient(120% 80% at 50% 50%,
        rgba(6,3,19,0) 0%,
        rgba(6,3,19,0.12) 45%,
        rgba(6,3,19,0.55) 100%);
  }

  /* ---------- scrolling verse stage ---------- */
  #viewport{
    position:fixed;inset:0;z-index:3;
    overflow:hidden;pointer-events:none;
  }
  #stage{
    position:absolute;top:0;left:0;right:0;
    will-change:transform;
    transform:translate3d(0,0,0);
  }
  .inner{
    max-width:760px;margin:0 auto;
    padding:0 28px;
  }
  .spacer{height:62vh;}
  .spacer.bottom{height:78vh;}

  /* title block */
  .titleblock{
    text-align:center;
    margin-bottom:14vh;
  }
  .eyebrow{
    font-family:'Cinzel',serif;
    letter-spacing:0.42em;
    font-size:0.72rem;
    text-transform:uppercase;
    color:var(--cyan);
    opacity:0.85;
    margin-bottom:1.6rem;
    padding-left:0.42em;
  }
  .title{
    font-family:'Cinzel',serif;
    font-weight:600;
    font-size:clamp(2.4rem,7vw,4.6rem);
    line-height:1.05;
    margin:0;
    background:linear-gradient(180deg,#fff 0%,var(--cream) 40%,var(--magenta) 130%);
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;
    text-shadow:0 0 60px rgba(212,76,196,0.25);
  }
  .byline{
    margin-top:1.5rem;
    font-style:italic;
    font-size:clamp(1rem,2.4vw,1.3rem);
    color:var(--dim);
    letter-spacing:0.04em;
  }

  /* verse lines */
  .line{
    font-weight:400;
    font-size:clamp(1.4rem,3.4vw,2.05rem);
    line-height:1.62;
    letter-spacing:0.012em;
    margin:0;
    color:rgba(239,234,255,0.42);
    text-shadow:0 1px 24px rgba(0,0,0,0.85),0 0 2px rgba(0,0,0,0.9);
    transition:color 1.1s ease, opacity 1.1s ease, text-shadow 1.1s ease, transform 1.1s ease;
    transform:translateY(0);
  }
  .line.gap{margin-top:1.5em;}
  .line.read{ color:rgba(239,234,255,0.62); }
  .line.active{
    color:#fff;
    text-shadow:
      0 1px 24px rgba(0,0,0,0.85),
      0 0 26px rgba(70,224,216,0.30),
      0 0 60px rgba(212,76,196,0.22);
  }
  .attrib{
    margin-top:2.6em;
    text-align:right;
    font-style:italic;
    font-size:clamp(1.05rem,2.6vw,1.4rem);
    color:var(--dim);
    letter-spacing:0.05em;
  }

  /* ---------- controls ---------- */
  .controls{
    position:fixed;left:50%;bottom:max(18px,env(safe-area-inset-bottom));
    transform:translateX(-50%);
    z-index:6;
    display:flex;align-items:center;gap:10px;
    padding:9px 13px;
    background:rgba(13,8,38,0.46);
    border:1px solid rgba(170,150,230,0.18);
    border-radius:999px;
    backdrop-filter:blur(14px) saturate(140%);
    -webkit-backdrop-filter:blur(14px) saturate(140%);
    box-shadow:0 10px 40px rgba(0,0,0,0.45);
    max-width:calc(100vw - 24px);
    flex-wrap:wrap;justify-content:center;
    opacity:0;transition:opacity 0.8s ease 0.2s;
  }
  .controls.show{opacity:1;}
  .btn{
    appearance:none;border:none;cursor:pointer;
    width:42px;height:42px;border-radius:50%;
    display:grid;place-items:center;
    background:rgba(91,58,158,0.30);
    color:var(--cream);
    transition:background 0.25s ease, transform 0.15s ease, box-shadow .25s ease;
    flex:0 0 auto;
  }
  .btn:hover{background:rgba(212,76,196,0.34);box-shadow:0 0 0 1px rgba(212,76,196,0.4);}
  .btn:active{transform:scale(0.93);}
  .btn svg{width:19px;height:19px;display:block;fill:currentColor;}
  .btn.small{width:38px;height:38px;}
  .ctl-group{
    display:flex;align-items:center;gap:8px;
    padding:0 6px;color:var(--dim);
    font-size:0.78rem;letter-spacing:0.04em;
  }
  .ctl-group label{font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;opacity:0.8;}
  input[type=range]{
    -webkit-appearance:none;appearance:none;
    width:84px;height:3px;border-radius:3px;
    background:rgba(170,150,230,0.30);outline:none;cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;appearance:none;width:13px;height:13px;border-radius:50%;
    background:var(--cyan);box-shadow:0 0 10px rgba(70,224,216,0.7);
  }
  input[type=range]::-moz-range-thumb{
    width:13px;height:13px;border:none;border-radius:50%;
    background:var(--cyan);box-shadow:0 0 10px rgba(70,224,216,0.7);
  }
  select{
    appearance:none;background:rgba(91,58,158,0.22);
    color:var(--cream);border:1px solid rgba(170,150,230,0.2);
    border-radius:8px;padding:6px 26px 6px 10px;font-family:inherit;font-size:0.85rem;
    cursor:pointer;max-width:150px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' fill='%23bcaee6'><path d='M0 2l5 6 5-6z'/></svg>");
    background-repeat:no-repeat;background-position:right 9px center;
  }
  select:focus{outline:1px solid rgba(70,224,216,0.5);}
  .divider{width:1px;height:24px;background:rgba(170,150,230,0.18);}

  .hint{
    position:fixed;left:50%;bottom:max(78px,calc(env(safe-area-inset-bottom) + 70px));
    transform:translateX(-50%);
    z-index:5;color:var(--dim);font-style:italic;font-size:0.85rem;
    letter-spacing:0.05em;text-align:center;pointer-events:none;
    opacity:0;transition:opacity 1s ease;white-space:nowrap;
  }
  .hint.show{opacity:0.7;}

  /* ---------- begin overlay ---------- */
  .overlay{
    position:fixed;inset:0;z-index:20;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:30px;
    background:radial-gradient(120% 100% at 50% 40%,rgba(13,8,38,0.55),rgba(6,3,19,0.86));
    transition:opacity 1.1s ease, visibility 1.1s ease;
  }
  .overlay.hide{opacity:0;visibility:hidden;}
  .overlay .eyebrow{margin-bottom:1.3rem;}
  .overlay .title{font-size:clamp(2.6rem,9vw,5.4rem);}
  .overlay .byline{margin-bottom:3rem;}
  .begin{
    appearance:none;cursor:pointer;
    font-family:'Cinzel',serif;font-size:0.82rem;letter-spacing:0.26em;text-transform:uppercase;
    color:var(--cream);
    background:transparent;
    border:1px solid rgba(170,150,230,0.4);
    border-radius:999px;padding:16px 34px;
    transition:all 0.4s ease;
    position:relative;overflow:hidden;
  }
  .begin:hover{
    border-color:var(--cyan);
    color:#fff;
    box-shadow:0 0 30px rgba(70,224,216,0.35), inset 0 0 30px rgba(212,76,196,0.18);
    letter-spacing:0.3em;
  }
  .silent{
    margin-top:1.6rem;color:var(--dim);font-style:italic;font-size:0.95rem;
    cursor:pointer;border:none;background:none;letter-spacing:0.04em;
    transition:color 0.3s ease;
  }
  .silent:hover{color:var(--cyan);}
  .unsupported{margin-top:1rem;font-size:0.8rem;color:var(--dim);font-style:italic;display:none;}

  @media (max-width:560px){
    .ctl-group.voicegrp{display:none;}
    .hint{font-size:0.78rem;}
  }
  @media (prefers-reduced-motion:reduce){
    .line{transition:color 0.4s ease, opacity 0.4s ease;}
  }
</style>
</head>
<body>
  <canvas id="bg"></canvas>
  <canvas id="fx"></canvas>
  <div class="scrim"></div>

  <div id="viewport">
    <div id="stage">
      <div class="inner">
        <div class="spacer"></div>
        <div class="titleblock">
          <div class="eyebrow">A Quantum Catechism</div>
          <h1 class="title">Cascade<br>Experiment</h1>
          <div class="byline">Alice Fulton · 1989</div>
        </div>
        <div id="verse"></div>
        <div class="spacer bottom"></div>
      </div>
    </div>
  </div>

  <div class="hint" id="hint">Move to stir the field · click to release a cascade...</div>

  <div class="controls" id="controls">
    <button class="btn" id="play" title="Read aloud" aria-label="Play narration">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <button class="btn small" id="restart" title="Restart" aria-label="Restart">
      <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7a5 5 0 1 1-5 5H5a7 7 0 1 0 7-7z"/></svg>
    </button>
    <div class="divider"></div>
    <div class="ctl-group">
      <label>Pace</label>
      <input type="range" id="rate" min="0.6" max="1.15" step="0.01" value="0.86">
    </div>
    <div class="divider"></div>
    <div class="ctl-group voicegrp">
      <label>Voice</label>
      <select id="voice" aria-label="Narration voice"></select>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="eyebrow">A Quantum Catechism...</div>
    <h1 class="title">Cascade Experiment</h1>
    <div class="byline">Alice Fulton · 1989</div>
    <button class="begin" id="beginBtn">Begin the experiment</button>
    <button class="silent" id="silentBtn">or drift through it in silence</button>
    <div class="unsupported" id="unsupported">Read-aloud isn't available in this browser — the verse will drift on its own.</div>
  </div>

<script>
(function(){
  "use strict";

  /* =========================================================
     POEM  (line-by-line; `gap:true` opens space between stanzas;
     `speak:false` lines are shown but not narrated)
     ========================================================= */
  const POEM = [
    {t:"Because faith creates its own verification"},
    {t:"and reaching you will be no harder than believing"},
    {t:"in a planet's caul of plasma,"},
    {t:"or interacting with a comet"},
    {t:"in its perihelion passage, no harder"},
    {t:"than considering what sparking of the vacuum, cosmological"},
    {t:"impromptu flung me here, a paraphrase, perhaps,"},
    {t:"for some denser, more difficult being,"},
    {t:"a subsidiary instance, easier to grasp"},
    {t:"than the span I foreshadow, of which I am a variable…"},
    {t:"My stance is passional towards the universe and you.", gap:true},
    {t:"Because faith in fact can help to create those facts,", gap:true},
    {t:"the way that electrons exist only when they're measured,"},
    {t:"or shy people stand alone at parties,"},
    {t:"attract no one, then go home and feel more shy,"},
    {t:"I begin by supposing that our attrition's no quicker"},
    {t:"than a star's, that like electrons,"},
    {t:"vanishing on one side of a wall and appearing on the other,"},
    {t:"without leaving any holes or being"},
    {t:"somewhere in between, the soul's decoupling"},
    {t:"is an oscillation so inward, nothing outward"},
    {t:"as the eye can see it."},
    {t:"The childhood catechisms all had heaven,", gap:true},
    {t:"an excitation of mist."},
    {t:"Grown, I thought a vacancy awaited me."},
    {t:"Now I find myself discarding and enlarging"},
    {t:"both these views, an infidel of vivacious amplitude."},
    {t:"Because truths we don't suspect have a hard time", gap:true},
    {t:"making themselves felt, as when thirteen species"},
    {t:"of Whiptail Lizards composed entirely of females"},
    {t:"stay undiscovered, due to presupposed bias"},
    {t:"against such things existing,"},
    {t:"we have to meet the universe halfway."},
    {t:"Nothing will unfold for us unless we move toward what", gap:true},
    {t:"looks to us like nothing: faith is a cascade."},
    {t:"A sequence of more convenient abstractions."},
    {t:"The sky's high solid is anything but,"},
    {t:"the sun going under hasn't budged,"},
    {t:"and if death divests the self"},
    {t:"it's the sole event in nature"},
    {t:"that's exactly what it seems."},
    {t:"Because, sometimes, believing a thing's true", gap:true},
    {t:"can bring about that truth,"},
    {t:"and you might be the shy one, lizard or electron,"},
    {t:"known only through advances"},
    {t:"presuming your existence, let my knowing glance be passional…"},
    {t:"Towards the Universe… And you."},
    {t:"— Alice Fulton, 1989", attrib:true, speak:false}
  ];

  /* =========================================================
     BUILD VERSE DOM
     ========================================================= */
  const verseEl = document.getElementById('verse');
  const lineEls = [];
  POEM.forEach((ln, i) => {
    const p = document.createElement('p');
    p.className = 'line' + (ln.gap ? ' gap' : '') + (ln.attrib ? ' attrib' : '');
    p.textContent = ln.t;
    p.dataset.index = i;
    verseEl.appendChild(p);
    lineEls.push(p);
  });

  /* =========================================================
     CANVAS SETUP
     ========================================================= */
  const bg = document.getElementById('bg'), bgx = bg.getContext('2d');
  const fx = document.getElementById('fx'), fxx = fx.getContext('2d');
  let W = 0, H = 0, DPR = 1;
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function resize(){
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    [bg, fx].forEach(c => {
      c.width = W * DPR; c.height = H * DPR;
      c.getContext('2d').setTransform(DPR,0,0,DPR,0,0);
    });
    bgx.setTransform(DPR,0,0,DPR,0,0);
    fxx.setTransform(DPR,0,0,DPR,0,0);
    layoutScroll();
  }

  /* ---------- nebula blobs ---------- */
  const TAU = Math.PI*2;
  const blobs = [];
  const blobHues = [262, 288, 322, 196, 210, 44, 348];
  for(let i=0;i<7;i++){
    blobs.push({
      hue: blobHues[i],
      bx: Math.random(), by: Math.random(),
      ax: 0.16 + Math.random()*0.20,   // orbit amplitude (fraction of screen)
      ay: 0.16 + Math.random()*0.20,
      px: Math.random()*TAU, py: Math.random()*TAU,
      sx: 0.05 + Math.random()*0.07,   // orbit speed
      sy: 0.05 + Math.random()*0.07,
      rad: 0.34 + Math.random()*0.22,  // radius fraction
      pr: Math.random()*TAU,           // radius pulse phase
      sr: 0.10 + Math.random()*0.10
    });
  }

  /* ---------- starfield ---------- */
  const stars = [];
  function seedStars(){
    stars.length = 0;
    const n = Math.round((W*H)/9000);
    for(let i=0;i<n;i++){
      stars.push({
        x: Math.random(), y: Math.random(),
        r: Math.random()*1.1 + 0.25,
        tw: Math.random()*TAU,
        sp: 0.6 + Math.random()*1.8,
        hue: Math.random()<0.25 ? (Math.random()<0.5?196:44) : -1
      });
    }
  }

  function drawBackground(t){
    // base void with a faint vertical wash
    const g = bgx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#08041a');
    g.addColorStop(0.55,'#060313');
    g.addColorStop(1,'#040210');
    bgx.fillStyle = g;
    bgx.fillRect(0,0,W,H);

    const hueShift = Math.sin(t*0.02)*22;

    bgx.globalCompositeOperation = 'lighter';
    for(const b of blobs){
      const cx = (b.bx + Math.sin(t*b.sx + b.px)*b.ax) * W;
      const cy = (b.by + Math.cos(t*b.sy + b.py)*b.ay) * H;
      const pulse = 1 + Math.sin(t*b.sr + b.pr)*0.22;
      const R = b.rad * Math.min(W,H) * pulse;
      const hue = b.hue + hueShift;
      const rg = bgx.createRadialGradient(cx,cy,0,cx,cy,R);
      rg.addColorStop(0, `hsla(${hue},85%,62%,0.40)`);
      rg.addColorStop(0.45,`hsla(${hue},80%,50%,0.16)`);
      rg.addColorStop(1, `hsla(${hue},80%,40%,0)`);
      bgx.fillStyle = rg;
      bgx.beginPath();
      bgx.arc(cx,cy,R,0,TAU);
      bgx.fill();
    }
    bgx.globalCompositeOperation = 'source-over';

    // stars
    for(const s of stars){
      const a = 0.35 + 0.45*(0.5+0.5*Math.sin(t*s.sp + s.tw));
      if(s.hue>0){
        bgx.fillStyle = `hsla(${s.hue},80%,75%,${a})`;
      } else {
        bgx.fillStyle = `rgba(235,232,255,${a})`;
      }
      bgx.beginPath();
      bgx.arc(s.x*W, s.y*H, s.r, 0, TAU);
      bgx.fill();
    }

    // vignette to settle the edges
    const v = bgx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.3,W/2,H/2,Math.max(W,H)*0.75);
    v.addColorStop(0,'rgba(6,3,19,0)');
    v.addColorStop(1,'rgba(4,2,14,0.65)');
    bgx.fillStyle = v;
    bgx.fillRect(0,0,W,H);
  }

  /* =========================================================
     FLOW-FIELD PARTICLES  (electrons / quantum dust)
     ========================================================= */
  // pre-rendered glow sprites per hue for performance
  const SPRITE_HUES = [262, 290, 322, 196, 210, 44];
  const sprites = SPRITE_HUES.map(h => makeGlow(h));
  function makeGlow(hue){
    const s = 34, c = document.createElement('canvas');
    c.width = c.height = s;
    const cx = c.getContext('2d');
    const g = cx.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
    g.addColorStop(0, `hsla(${hue},90%,72%,1)`);
    g.addColorStop(0.3,`hsla(${hue},88%,60%,0.55)`);
    g.addColorStop(1, `hsla(${hue},85%,55%,0)`);
    cx.fillStyle = g;
    cx.fillRect(0,0,s,s);
    return c;
  }

  function flowAngle(x, y, t){
    return TAU * (
      Math.sin(x*0.0017 + t*0.30) +
      Math.sin(y*0.0021 - t*0.25) +
      Math.sin((x+y)*0.0011 + t*0.40)
    ) * 0.5;
  }

  const particles = [];
  function seedParticles(){
    particles.length = 0;
    const n = Math.min(360, Math.round((W*H)/5200));
    for(let i=0;i<n;i++) particles.push(newParticle(Math.random()*W, Math.random()*H));
  }
  function newParticle(x,y,burst){
    const sp = sprites[(Math.random()*sprites.length)|0];
    const p = {
      x, y,
      vx:0, vy:0,
      size: 0.6 + Math.random()*2.2,
      base: 0.5 + Math.random()*0.5,
      sprite: sp,
      speed: 0.4 + Math.random()*0.9,
      tunnel: 380 + Math.random()*900,   // frames until a chance to quantum-tunnel
      life: 1, decay: 0, burst: !!burst
    };
    if(burst){
      const a = Math.random()*TAU, s = 1.4 + Math.random()*3.4;
      p.vx = Math.cos(a)*s; p.vy = Math.sin(a)*s;
      p.life = 1; p.decay = 0.006 + Math.random()*0.01;
      p.size = 0.8 + Math.random()*2.4;
    }
    return p;
  }

  // pointer interaction
  const pointer = {x:-9999, y:-9999, active:false, down:0};
  let comet = null, cometTimer = 220 + Math.random()*260;

  function updateParticles(t, dt){
    // trail fade
    fxx.globalCompositeOperation = 'source-over';
    fxx.fillStyle = 'rgba(6,3,19,0.18)';
    fxx.fillRect(0,0,W,H);

    fxx.globalCompositeOperation = 'lighter';

    for(let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      const ang = flowAngle(p.x, p.y, t);
      let fxv = Math.cos(ang)*p.speed;
      let fyv = Math.sin(ang)*p.speed;

      // gentle vortex toward the pointer — meeting the universe halfway
      if(pointer.active){
        const dx = pointer.x - p.x, dy = pointer.y - p.y;
        const d2 = dx*dx + dy*dy;
        const R = pointer.down>0 ? 240 : 170;
        if(d2 < R*R){
          const d = Math.sqrt(d2) || 1;
          const f = (1 - d/R);
          // perpendicular swirl + slight inward pull
          fxv += (-dy/d) * f * 2.6 + (dx/d) * f * 0.6;
          fyv += ( dx/d) * f * 2.6 + (dy/d) * f * 0.6;
        }
      }

      p.vx += (fxv - p.vx)*0.08;
      p.vy += (fyv - p.vy)*0.08;
      p.x += p.vx;
      p.y += p.vy;

      // quantum tunnelling: occasionally vanish and reappear elsewhere,
      // leaving no holes or being somewhere in between
      if(!p.burst){
        p.tunnel -= 1;
        if(p.tunnel <= 0){
          p.x = Math.random()*W; p.y = Math.random()*H;
          p.tunnel = 380 + Math.random()*1100;
        }
        // wrap edges
        if(p.x < -20) p.x = W+20; else if(p.x > W+20) p.x = -20;
        if(p.y < -20) p.y = H+20; else if(p.y > H+20) p.y = -20;
      }

      // burst particles decay
      if(p.burst){
        p.vx *= 0.97; p.vy *= 0.97;
        p.life -= p.decay;
        if(p.life <= 0 || p.x<-30||p.x>W+30||p.y<-30||p.y>H+30){
          particles.splice(i,1); continue;
        }
      }

      const tw = 0.55 + 0.45*Math.sin(t*2 + p.x*0.05);
      const alpha = (p.base*tw) * (p.burst ? p.life : 1);
      const sz = p.size * (p.burst ? (3 + p.life*5) : 4);
      fxx.globalAlpha = Math.max(0, Math.min(1, alpha));
      fxx.drawImage(p.sprite, p.x - sz/2, p.y - sz/2, sz, sz);
    }
    fxx.globalAlpha = 1;

    // pointer aura
    if(pointer.active){
      const g = fxx.createRadialGradient(pointer.x,pointer.y,0,pointer.x,pointer.y,90);
      g.addColorStop(0,'rgba(70,224,216,0.20)');
      g.addColorStop(1,'rgba(70,224,216,0)');
      fxx.fillStyle = g;
      fxx.beginPath(); fxx.arc(pointer.x,pointer.y,90,0,TAU); fxx.fill();
    }

    // comet at perihelion
    cometTimer -= 1;
    if(!comet && cometTimer <= 0){ spawnComet(); cometTimer = 520 + Math.random()*640; }
    if(comet){ drawComet(); }

    fxx.globalCompositeOperation = 'source-over';
  }

  function spawnComet(){
    const fromLeft = Math.random()<0.5;
    const y0 = H*(0.12 + Math.random()*0.5);
    comet = {
      x: fromLeft ? -60 : W+60,
      y: y0,
      vx: (fromLeft?1:-1)*(4.5+Math.random()*2.5),
      vy: (Math.random()-0.5)*1.6,
      hue: Math.random()<0.5 ? 196 : 44,
      trail: []
    };
  }
  function drawComet(){
    comet.x += comet.vx; comet.y += comet.vy;
    comet.trail.push({x:comet.x, y:comet.y});
    if(comet.trail.length > 26) comet.trail.shift();
    // tail
    for(let i=0;i<comet.trail.length;i++){
      const pt = comet.trail[i];
      const a = (i/comet.trail.length);
      const r = 1 + a*3.2;
      fxx.globalAlpha = a*0.5;
      fxx.fillStyle = `hsla(${comet.hue},90%,70%,1)`;
      fxx.beginPath(); fxx.arc(pt.x,pt.y,r,0,TAU); fxx.fill();
    }
    // head glow
    fxx.globalAlpha = 1;
    const hg = fxx.createRadialGradient(comet.x,comet.y,0,comet.x,comet.y,14);
    hg.addColorStop(0,`hsla(${comet.hue},95%,85%,0.95)`);
    hg.addColorStop(1,`hsla(${comet.hue},90%,70%,0)`);
    fxx.fillStyle = hg;
    fxx.beginPath(); fxx.arc(comet.x,comet.y,14,0,TAU); fxx.fill();
    if(comet.x < -120 || comet.x > W+120) comet = null;
  }

  function cascade(x,y){
    const n = 34 + (Math.random()*16|0);
    for(let i=0;i<n;i++) particles.push(newParticle(x,y,true));
    // expanding ring drawn over a few frames via a temporary burst
    rings.push({x,y,r:6,a:0.55});
  }
  const rings = [];
  function drawRings(){
    fxx.globalCompositeOperation = 'lighter';
    for(let i=rings.length-1;i>=0;i--){
      const r = rings[i];
      r.r += 5.5; r.a -= 0.018;
      if(r.a <= 0){ rings.splice(i,1); continue; }
      fxx.globalAlpha = r.a;
      fxx.strokeStyle = 'rgba(212,76,196,0.9)';
      fxx.lineWidth = 1.4;
      fxx.beginPath(); fxx.arc(r.x,r.y,r.r,0,TAU); fxx.stroke();
    }
    fxx.globalAlpha = 1;
    fxx.globalCompositeOperation = 'source-over';
  }

  /* =========================================================
     MAIN LOOP
     ========================================================= */
  let last = performance.now();
  function loop(now){
    const dt = Math.min(0.05, (now - last)/1000);
    last = now;
    const t = now/1000;
    if(!reduceMotion){
      drawBackground(t);
      updateParticles(t, dt);
      drawRings();
    } else {
      drawBackground(t*0.3);
    }
    stepScroll(dt);
    requestAnimationFrame(loop);
  }

  /* =========================================================
     CUSTOM SCROLL  (transform-based; no native page scroll)
     ========================================================= */
  const viewportEl = document.getElementById('viewport');
  const stageEl = document.getElementById('stage');
  let offset = 0, target = 0, maxOffset = 0;
  let driftOn = false;
  const driftSpeed = 13;          // px / second — slow
  let lastUserMove = -99999;

  function layoutScroll(){
    const sh = stageEl.scrollHeight;
    maxOffset = Math.max(0, sh - H);
    target = clamp(target, 0, maxOffset);
    offset = clamp(offset, 0, maxOffset);
  }
  function clamp(v,a,b){ return v<a?a:(v>b?b:v); }

  function stepScroll(dt){
    const now = performance.now();
    if(driftOn && !reading && (now - lastUserMove) > 2600){
      target = clamp(target + driftSpeed*dt, 0, maxOffset);
    }
    // ease toward target
    const k = 1 - Math.pow(0.0009, dt); // smooth, frame-rate independent
    offset += (target - offset) * k;
    if(Math.abs(target-offset) < 0.05) offset = target;
    stageEl.style.transform = `translate3d(0,${-offset}px,0)`;
  }

  function centerLine(i){
    const el = lineEls[i];
    if(!el) return;
    const c = el.offsetTop + el.offsetHeight/2 - H*0.46;
    target = clamp(c, 0, maxOffset);
  }

  // wheel + touch as manual scroll
  function manualScroll(delta){
    target = clamp(target + delta, 0, maxOffset);
    lastUserMove = performance.now();
  }
  window.addEventListener('wheel', (e)=>{
    if(e.target.closest('.controls') || e.target.closest('.overlay')) return;
    e.preventDefault();
    manualScroll(e.deltaY);
  }, {passive:false});

  let touchY = null;
  window.addEventListener('touchstart', (e)=>{
    if(e.target.closest('.controls') || e.target.closest('.overlay')) return;
    touchY = e.touches[0].clientY;
  }, {passive:true});
  window.addEventListener('touchmove', (e)=>{
    if(touchY===null) return;
    if(e.target.closest('.controls') || e.target.closest('.overlay')) return;
    const y = e.touches[0].clientY;
    manualScroll(touchY - y);
    touchY = y;
    e.preventDefault();
  }, {passive:false});
  window.addEventListener('touchend', ()=>{ touchY = null; });

  /* =========================================================
     POINTER (field interaction)
     ========================================================= */
  window.addEventListener('mousemove', (e)=>{
    pointer.x = e.clientX; pointer.y = e.clientY; pointer.active = true;
  });
  window.addEventListener('mouseleave', ()=>{ pointer.active = false; });
  window.addEventListener('mousedown', ()=>{ pointer.down = 1; });
  window.addEventListener('mouseup', ()=>{ pointer.down = 0; });
  window.addEventListener('click', (e)=>{
    if(e.target.closest('.controls') || e.target.closest('.overlay')) return;
    cascade(e.clientX, e.clientY);
  });
  window.addEventListener('touchstart', (e)=>{
    if(e.target.closest('.controls') || e.target.closest('.overlay')) return;
    const tt = e.touches[0];
    pointer.x = tt.clientX; pointer.y = tt.clientY; pointer.active = true; pointer.down = 1;
    cascade(tt.clientX, tt.clientY);
  }, {passive:true});
  window.addEventListener('touchmove', (e)=>{
    const tt = e.touches[0];
    if(tt){ pointer.x = tt.clientX; pointer.y = tt.clientY; pointer.active = true; }
  }, {passive:true});
  window.addEventListener('touchend', ()=>{ pointer.down = 0; setTimeout(()=>pointer.active=false, 1200); });

  /* =========================================================
     TEXT-TO-SPEECH  (line-by-line for reliable sync)
     ========================================================= */
  const synth = window.speechSynthesis;
  const ttsSupported = !!synth && typeof SpeechSynthesisUtterance !== 'undefined';
  let voices = [], chosenVoice = null;
  let reading = false, idx = 0, rate = 0.86;

  const voiceSel = document.getElementById('voice');
  const rateInput = document.getElementById('rate');
  const playBtn = document.getElementById('play');
  const restartBtn = document.getElementById('restart');

  function scoreVoice(v){
    let s = 0;
    const n = (v.name||'').toLowerCase();
    const l = (v.lang||'').toLowerCase();
    if(l.startsWith('en-gb')) s += 5; else if(l.startsWith('en')) s += 3;
    if(/natural|neural|online|premium|enhanced/.test(n)) s += 6;
    if(/google/.test(n)) s += 4;
    if(/siri|samantha|daniel|sonia|libby|aria|jenny|ryan|serena/.test(n)) s += 3;
    if(/female|woman/.test(n)) s += 1;
    return s;
  }
  function loadVoices(){
    if(!ttsSupported) return;
    voices = synth.getVoices().filter(v => (v.lang||'').toLowerCase().startsWith('en'));
    voices.sort((a,b)=> scoreVoice(b)-scoreVoice(a));
    voiceSel.innerHTML = '';
    voices.forEach((v,i)=>{
      const o = document.createElement('option');
      o.value = i;
      o.textContent = v.name.replace(/\s*\(.*?\)\s*/g,' ').trim() + (v.lang?` · ${v.lang}`:'');
      voiceSel.appendChild(o);
    });
    if(voices.length){ chosenVoice = voices[0]; voiceSel.value = 0; }
  }
  if(ttsSupported){
    loadVoices();
    synth.onvoiceschanged = loadVoices;
  }
  voiceSel.addEventListener('change', ()=>{
    chosenVoice = voices[+voiceSel.value] || null;
    if(reading){ const j = idx; stopSpeech(); reading = true; speakFrom(j); }
  });
  rateInput.addEventListener('input', ()=>{ rate = +rateInput.value; });

  function setActive(i){
    lineEls.forEach((el,k)=>{
      el.classList.toggle('active', k===i);
      if(k<i) el.classList.add('read');
    });
  }
  function clearActive(){ lineEls.forEach(el=>el.classList.remove('active')); }

  function speakFrom(i){
    if(!reading) return;
    // skip non-spoken lines but still highlight/scroll briefly
    while(i < POEM.length && POEM[i].speak === false){
      setActive(i); centerLine(i); i++;
    }
    if(i >= POEM.length){ finishReading(); return; }
    idx = i;
    setActive(i);
    centerLine(i);

    const u = new SpeechSynthesisUtterance(POEM[i].t.replace(/…/g,'... '));
    if(chosenVoice) u.voice = chosenVoice;
    u.lang = (chosenVoice && chosenVoice.lang) || 'en-GB';
    u.rate = rate;
    u.pitch = 1.0;
    u.onend = ()=>{
      if(!reading) return;
      const gap = POEM[i].gap ? 520 : 240;
      setTimeout(()=>{ if(reading) speakFrom(i+1); }, gap);
    };
    u.onerror = ()=>{ if(reading) setTimeout(()=>speakFrom(i+1), 120); };
    synth.speak(u);
  }
  function startReading(from){
    if(!ttsSupported){ driftOn = true; return; }
    synth.cancel();
    reading = true;
    setPlayIcon(true);
    speakFrom(from!=null?from:0);
  }
  function stopSpeech(){
    reading = false;
    if(ttsSupported) synth.cancel();
    setPlayIcon(false);
  }
  function finishReading(){
    reading = false;
    setPlayIcon(false);
    clearActive();
    driftOn = true;            // let it drift gently onward / settle
  }

  const ICON_PLAY = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
  const ICON_PAUSE = '<svg viewBox="0 0 24 24"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>';
  function setPlayIcon(playing){ playBtn.innerHTML = playing ? ICON_PAUSE : ICON_PLAY; }

  playBtn.addEventListener('click', ()=>{
    if(!ttsSupported){
      driftOn = !driftOn; // toggle silent drift
      return;
    }
    if(reading){ stopSpeech(); driftOn = true; }
    else { driftOn = false; startReading(idx>=POEM.length?0:idx); }
  });
  restartBtn.addEventListener('click', ()=>{
    idx = 0; target = 0;
    lineEls.forEach(el=>el.classList.remove('read','active'));
    if(ttsSupported){ driftOn = false; startReading(0); }
    else { driftOn = true; }
  });

  // keyboard
  window.addEventListener('keydown', (e)=>{
    if(e.code === 'Space'){ e.preventDefault(); playBtn.click(); }
  });

  /* =========================================================
     BEGIN / SILENT  overlay
     ========================================================= */
  const overlay = document.getElementById('overlay');
  const controls = document.getElementById('controls');
  const hint = document.getElementById('hint');
  const beginBtn = document.getElementById('beginBtn');
  const silentBtn = document.getElementById('silentBtn');
  const unsupported = document.getElementById('unsupported');

  if(!ttsSupported){
    beginBtn.textContent = 'Enter the field';
    unsupported.style.display = 'block';
  }

  function revealUI(){
    overlay.classList.add('hide');
    controls.classList.add('show');
    hint.classList.add('show');
    setTimeout(()=>hint.classList.remove('show'), 6500);
  }
  function warmSpeech(){
    // a silent priming utterance unlocks speech on some browsers
    if(ttsSupported){
      try{ const u = new SpeechSynthesisUtterance(' '); u.volume=0; synth.speak(u); }catch(e){}
    }
  }
  beginBtn.addEventListener('click', ()=>{
    revealUI();
    warmSpeech();
    if(ttsSupported){ setTimeout(()=>startReading(0), 400); }
    else { driftOn = true; }
  });
  silentBtn.addEventListener('click', ()=>{
    revealUI();
    driftOn = true;
  });

  /* =========================================================
     INIT
     ========================================================= */
  function init(){
    resize();
    seedStars();
    seedParticles();
    requestAnimationFrame(loop);
  }
  let rT;
  window.addEventListener('resize', ()=>{
    clearTimeout(rT);
    rT = setTimeout(()=>{ resize(); seedStars(); seedParticles(); }, 180);
  });
  // recompute scroll bounds once fonts settle
  if(document.fonts && document.fonts.ready){
    document.fonts.ready.then(()=>{ layoutScroll(); });
  }
  window.addEventListener('load', layoutScroll);

  init();
})();
</script>
</body>
</html>
